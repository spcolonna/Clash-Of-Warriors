name: clash_of_styles
description: Tactical combat mobile game
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_analytics: ^11.3.7

  # Auth providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Ads
  google_mobile_ads: ^5.2.0

  # UI
  phosphor_flutter: ^2.1.0 # iconos

  # Audio
  audioplayers: ^6.1.0

  # Local storage
  shared_preferences: ^2.3.4
  google_fonts: ^8.0.2
  go_router: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/heros/
    - assets/sounds/
    - assets/fonts/
